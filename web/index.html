<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentMES — live kanban</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="icon">⚙</span>
      <h1>AgentMES</h1>
      <span class="tagline">manufacturing execution for autonomous agents</span>
    </div>
    <div class="state-indicator" id="state-indicator">ready — press Launch</div>
    <button id="launch-btn" class="launch-btn">▶ Launch Pipeline</button>
    <a href="/replay" class="replay-link">↻ asciinema replay</a>
  </header>

  <main class="board" id="board">
    <div class="column" data-stage="plan">
      <div class="col-header">PLAN</div>
      <div class="cards" id="col-plan"></div>
    </div>
    <div class="column" data-stage="design">
      <div class="col-header">DESIGN</div>
      <div class="cards" id="col-design"></div>
    </div>
    <div class="column" data-stage="build">
      <div class="col-header">BUILD</div>
      <div class="cards" id="col-build"></div>
    </div>
    <div class="column" data-stage="test">
      <div class="col-header">TEST</div>
      <div class="cards" id="col-test"></div>
    </div>
    <div class="column" data-stage="review">
      <div class="col-header">REVIEW</div>
      <div class="cards" id="col-review"></div>
    </div>
    <div class="column" data-stage="document">
      <div class="col-header">DOCUMENT</div>
      <div class="cards" id="col-document"></div>
    </div>
    <div class="column" data-stage="deploy">
      <div class="col-header">DEPLOY/MAINTAIN</div>
      <div class="cards" id="col-deploy"></div>
    </div>
  </main>

  <footer class="bottombar">
    <span>Blaxel × Codex × Redis AI Hack Day · Wordware HQ · 2026-04-11</span>
    <span>·</span>
    <a href="https://github.com/benikigai/agent-mes" target="_blank">github.com/benikigai/agent-mes</a>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
